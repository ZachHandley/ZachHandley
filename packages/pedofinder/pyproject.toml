[project]
name = "pedofinder"
version = "0.1.0"
description = "Epstein document analyzer - Extract and index entities, relationships, and connections from court documents"
readme = "README.md"
authors = [
    { name = "Zach Handley", email = "zachhandley@gmail.com" }
]
requires-python = ">=3.11"
dependencies = [
    "docling>=2.23.0",
    "docling-core>=2.14.1",
    "litellm>=1.61.0",
    "lancedb>=0.20.0",
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.34.0",
    "appwrite>=7.0.0",
    "aiosqlite>=0.21.0",
    "pydantic>=2.10.0",
    "httpx>=0.28.0",
    "python-dotenv>=1.0.0",
    "rich>=13.9.0",
    "typer>=0.15.0",
    "pydantic-settings>=2.7.0",
    "numpy>=1.26.0",
    "pandas>=2.2.0",
    "playwright>=1.56.0",
    "spacy[transformers]>=3.8.9",
    "sentence-transformers>=5.1.2",
    "tqdm>=4.67.1",
    "pinecone-client>=5.0.0",
]

[project.optional-dependencies]
dev = [
    "ruff>=0.9.0",
    "mypy>=1.14.0",
    "pytest>=8.3.0",
    "pytest-asyncio>=0.25.0",
    "pytest-cov>=6.0.0",
    "ipython>=8.31.0",
]

[project.scripts]
pedofinder = "pedofinder.cli:app"

[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # pyflakes
    "I",      # isort
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "UP",     # pyupgrade
    "ARG",    # flake8-unused-arguments
    "SIM",    # flake8-simplify
    "TCH",    # flake8-type-checking
    "ANN",    # flake8-annotations
]
ignore = [
    "ANN101",  # Missing type annotation for self
    "ANN102",  # Missing type annotation for cls
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["ANN"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_any_generics = true
disallow_subclassing_any = true
disallow_untyped_calls = true
disallow_incomplete_defs = true
check_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
follow_imports = "normal"
ignore_missing_imports = false

[[tool.mypy.overrides]]
module = [
    "docling.*",
    "lancedb.*",
    "appwrite.*",
    "litellm.*",
    "pydantic_settings.*",
    "pinecone.*",
    "sentence_transformers.*",
    "spacy.*",
    "PyPDF2.*",
]
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
pythonpath = ["src"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "ipython>=9.7.0",
    "mypy>=1.18.2",
    "pytest>=9.0.1",
    "pytest-asyncio>=1.3.0",
    "pytest-cov>=7.0.0",
    "ruff>=0.14.5",
    "types-tqdm>=4.67.0.20250809",
]
